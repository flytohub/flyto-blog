<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Central website browser -->
  <rect x="310" y="30" width="340" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="310" y="30" width="340" height="32" rx="12" fill="#334155"/>
  <rect x="310" y="52" width="340" height="10" fill="#334155"/>
  <circle cx="330" cy="46" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="346" cy="46" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="362" cy="46" r="5" fill="#10b981" opacity="0.7"/>
  <rect x="390" y="39" width="140" height="14" rx="3" fill="#1e293b"/>
  <text x="460" y="50" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="8">website.com</text>

  <!-- Page content -->
  <rect x="330" y="75" width="100" height="8" rx="2" fill="#475569"/>
  <rect x="330" y="90" width="70" height="6" rx="2" fill="#334155"/>
  <!-- Form fields -->
  <rect x="330" y="110" width="140" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <rect x="330" y="140" width="140" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <!-- Button -->
  <rect x="330" y="170" width="80" height="24" rx="6" fill="#7c3aed" opacity="0.6"/>
  <text x="370" y="186" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="9">Submit</text>
  <!-- Table -->
  <rect x="490" y="75" width="140" height="80" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="92" x2="630" y2="92" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="108" x2="630" y2="108" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="124" x2="630" y2="124" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="140" x2="630" y2="140" stroke="#334155" stroke-width="1"/>
  <line x1="560" y1="75" x2="560" y2="155" stroke="#334155" stroke-width="1"/>

  <!-- Click action arrow (left) -->
  <path d="M 280 100 L 325 100" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="325,95 335,100 325,105" fill="#f59e0b"/>
  <rect x="130" y="80" width="140" height="40" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Cursor icon -->
  <polygon points="155,92 155,112 163,106 169,118 174,116 168,104 176,102" fill="#f59e0b" opacity="0.8"/>
  <text x="215" y="105" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Click</text>

  <!-- Fill action arrow (left) -->
  <path d="M 280 150 L 325 140" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="322,134 335,138 324,145" fill="#a78bfa"/>
  <rect x="130" y="135" width="140" height="40" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Keyboard icon -->
  <rect x="155" y="147" width="24" height="14" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="158" y="150" width="4" height="3" rx="0.5" fill="#a78bfa" opacity="0.5"/>
  <rect x="164" y="150" width="4" height="3" rx="0.5" fill="#a78bfa" opacity="0.5"/>
  <rect x="170" y="150" width="4" height="3" rx="0.5" fill="#a78bfa" opacity="0.5"/>
  <rect x="159" y="155" width="14" height="3" rx="0.5" fill="#a78bfa" opacity="0.5"/>
  <text x="215" y="160" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Fill</text>

  <!-- Extract action arrow (right) -->
  <path d="M 635 110 L 680 110" stroke="#10b981" stroke-width="2"/>
  <polygon points="680,105 690,110 680,115" fill="#10b981"/>
  <rect x="700" y="90" width="170" height="40" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <!-- Table/data icon -->
  <rect x="720" y="100" width="20" height="16" rx="2" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <line x1="720" y1="108" x2="740" y2="108" stroke="#10b981" stroke-width="1"/>
  <line x1="730" y1="100" x2="730" y2="116" stroke="#10b981" stroke-width="1"/>
  <text x="795" y="115" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Extract Data</text>

  <!-- Download action (right bottom) -->
  <path d="M 635 190 L 680 190" stroke="#10b981" stroke-width="2"/>
  <polygon points="680,185 690,190 680,195" fill="#10b981"/>
  <rect x="700" y="170" width="170" height="40" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <!-- Download icon -->
  <line x1="730" y1="182" x2="730" y2="198" stroke="#10b981" stroke-width="2"/>
  <polygon points="724,194 730,202 736,194" fill="#10b981"/>
  <text x="795" y="195" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Download</text>

  <!-- Footer -->
  <text x="480" y="280" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>