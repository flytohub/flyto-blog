<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Header -->
  <text x="480" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Cloud-Based Tools vs Flyto2</text>

  <!-- Column headers -->
  <rect x="120" y="50" width="300" height="30" rx="6" fill="#334155"/>
  <text x="270" y="70" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Feature</text>

  <rect x="430" y="50" width="200" height="30" rx="6" fill="#475569"/>
  <text x="530" y="70" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Cloud-Based</text>

  <rect x="640" y="50" width="200" height="30" rx="6" fill="#7c3aed" opacity="0.3"/>
  <text x="740" y="70" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Flyto2</text>

  <!-- Row 1: Cost -->
  <text x="270" y="108" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Cost</text>
  <text x="530" y="108" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="13">Free tier + paid plans</text>
  <text x="740" y="108" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Completely free</text>
  <line x1="120" y1="118" x2="840" y2="118" stroke="#334155" stroke-width="1"/>

  <!-- Row 2: Account -->
  <text x="270" y="143" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Account required</text>
  <text x="530" y="143" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="13">Yes</text>
  <text x="740" y="143" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="600">No</text>
  <line x1="120" y1="153" x2="840" y2="153" stroke="#334155" stroke-width="1"/>

  <!-- Row 3: Offline -->
  <text x="270" y="178" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Runs offline</text>
  <text x="530" y="178" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="13">No</text>
  <text x="740" y="178" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Yes</text>
  <line x1="120" y1="188" x2="840" y2="188" stroke="#334155" stroke-width="1"/>

  <!-- Row 4: Data -->
  <text x="270" y="213" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Data stays local</text>
  <text x="530" y="213" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="13">Not always</text>
  <text x="740" y="213" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Always</text>
  <line x1="120" y1="223" x2="840" y2="223" stroke="#334155" stroke-width="1"/>

  <!-- Row 5: Open source -->
  <text x="270" y="248" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Open source</text>
  <text x="530" y="248" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="13">No</text>
  <text x="740" y="248" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Yes</text>

  <!-- Footer -->
  <text x="480" y="285" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">flyto2.com</text>
</svg>