<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">How to Automate Any Website</text>

  <!-- Website mockup -->
  <rect x="310" y="90" width="340" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="310" y="90" width="340" height="32" rx="12" fill="#334155"/>
  <rect x="310" y="110" width="340" height="12" fill="#334155"/>
  <circle cx="330" cy="106" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="346" cy="106" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="362" cy="106" r="5" fill="#10b981" opacity="0.7"/>

  <!-- Website content blocks -->
  <rect x="330" y="140" width="120" height="14" rx="3" fill="#475569"/>
  <rect x="330" y="162" width="200" height="8" rx="2" fill="#334155"/>
  <rect x="330" y="176" width="180" height="8" rx="2" fill="#334155"/>
  <rect x="330" y="200" width="100" height="30" rx="6" fill="#334155"/>
  <rect x="330" y="245" width="280" height="8" rx="2" fill="#334155"/>
  <rect x="330" y="260" width="250" height="8" rx="2" fill="#334155"/>
  <rect x="330" y="275" width="260" height="8" rx="2" fill="#334155"/>

  <!-- Automation flow arrows circling the website -->
  <!-- Top arrow going right -->
  <path d="M 310 80 Q 480 50 650 80" fill="none" stroke="url(#purple)" stroke-width="2.5" stroke-dasharray="8 4"/>
  <polygon points="646,72 656,80 646,88" fill="#a78bfa"/>

  <!-- Right arrow going down -->
  <path d="M 660 90 Q 690 200 660 310" fill="none" stroke="url(#purple)" stroke-width="2.5" stroke-dasharray="8 4"/>
  <polygon points="652,306 660,316 668,306" fill="#a78bfa"/>

  <!-- Bottom arrow going left -->
  <path d="M 650 320 Q 480 350 310 320" fill="none" stroke="url(#purple)" stroke-width="2.5" stroke-dasharray="8 4"/>
  <polygon points="314,328 304,320 314,312" fill="#a78bfa"/>

  <!-- Left arrow going up -->
  <path d="M 300 310 Q 270 200 300 90" fill="none" stroke="url(#purple)" stroke-width="2.5" stroke-dasharray="8 4"/>
  <polygon points="292,94 300,84 308,94" fill="#a78bfa"/>

  <!-- Action labels on arrows -->
  <text x="480" y="44" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Navigate</text>
  <text x="710" y="205" text-anchor="start" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Extract</text>
  <text x="480" y="368" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Submit</text>
  <text x="248" y="205" text-anchor="end" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Click</text>

  <!-- Footer -->
  <text x="480" y="410" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>