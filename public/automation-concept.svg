<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">How Computer Automation Works</text>

  <!-- Trigger -->
  <rect x="80" y="70" width="200" height="160" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <!-- Lightning bolt icon -->
  <polygon points="180,95 165,130 180,125 170,160 195,120 180,125" fill="#f59e0b" opacity="0.8"/>
  <text x="180" y="190" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Trigger</text>
  <text x="180" y="210" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Schedule, button press,</text>
  <text x="180" y="222" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">or file appears</text>

  <!-- Arrow -->
  <path d="M 300 150 L 360 150" stroke="url(#purple)" stroke-width="3"/>
  <polygon points="360,143 378,150 360,157" fill="url(#purple)"/>

  <!-- Steps -->
  <rect x="390" y="70" width="200" height="160" rx="14" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <!-- Numbered list -->
  <circle cx="430" cy="108" r="10" fill="#7c3aed" opacity="0.3"/>
  <text x="430" y="112" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">1</text>
  <rect x="450" y="102" width="110" height="12" rx="3" fill="#334155"/>
  <text x="455" y="112" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Open website</text>

  <circle cx="430" cy="135" r="10" fill="#7c3aed" opacity="0.3"/>
  <text x="430" y="139" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">2</text>
  <rect x="450" y="129" width="110" height="12" rx="3" fill="#334155"/>
  <text x="455" y="139" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Click download</text>

  <circle cx="430" cy="162" r="10" fill="#7c3aed" opacity="0.3"/>
  <text x="430" y="166" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">3</text>
  <rect x="450" y="156" width="110" height="12" rx="3" fill="#334155"/>
  <text x="455" y="166" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Move to folder</text>

  <text x="490" y="200" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Steps</text>
  <text x="490" y="218" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Follow instructions</text>
  <text x="490" y="230" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">in order</text>

  <!-- Arrow -->
  <path d="M 610 150 L 670 150" stroke="url(#green)" stroke-width="3"/>
  <polygon points="670,143 688,150 670,157" fill="url(#green)"/>

  <!-- Result -->
  <rect x="700" y="70" width="200" height="160" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <!-- Big checkmark -->
  <circle cx="800" cy="120" r="30" fill="#10b981" opacity="0.1"/>
  <circle cx="800" cy="120" r="22" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <polyline points="787,120 796,131 816,108" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="800" y="190" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Result</text>
  <text x="800" y="210" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Task complete with</text>
  <text x="800" y="222" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">full audit trail</text>

  <!-- Footer -->
  <text x="480" y="272" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>