<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="52" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Modules, Not Magic</text>

  <!-- Left: Magic Prompt approach -->
  <rect x="40" y="80" width="410" height="320" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="40" y="80" width="410" height="44" rx="12" fill="url(#red)" opacity="0.15"/>
  <text x="245" y="108" text-anchor="middle" fill="#f87171" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Traditional AI Agent</text>

  <!-- Left flow -->
  <rect x="80" y="145" width="330" height="36" rx="8" fill="#334155"/>
  <text x="245" y="168" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">"screenshot this page"</text>

  <text x="245" y="205" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="20">↓</text>

  <rect x="80" y="215" width="330" height="36" rx="8" fill="#334155"/>
  <text x="245" y="238" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13">LLM writes code from scratch...</text>

  <text x="245" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="20">↓</text>

  <rect x="80" y="285" width="330" height="36" rx="8" fill="#334155"/>
  <text x="245" y="308" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="13">Different output every time ✗</text>

  <rect x="80" y="340" width="330" height="36" rx="8" fill="#334155"/>
  <text x="245" y="363" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="13">No trace, no replay ✗</text>

  <!-- Right: Module approach -->
  <rect x="510" y="80" width="410" height="320" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="510" y="80" width="410" height="44" rx="12" fill="url(#green)" opacity="0.15"/>
  <text x="715" y="108" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Flyto2 — 412 Validated Modules</text>

  <!-- Right flow -->
  <rect x="550" y="145" width="330" height="36" rx="8" fill="#334155"/>
  <text x="715" y="168" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">"screenshot this page"</text>

  <text x="715" y="205" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="20">↓</text>

  <rect x="550" y="215" width="330" height="36" rx="8" fill="#334155"/>
  <text x="715" y="238" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="13">→ browser.screenshot {validated}</text>

  <text x="715" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="20">↓</text>

  <rect x="550" y="285" width="330" height="36" rx="8" fill="#334155"/>
  <text x="715" y="308" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13">Same input → same output ✓</text>

  <rect x="550" y="340" width="330" height="36" rx="8" fill="#334155"/>
  <text x="715" y="363" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13">Full trace, replay from any step ✓</text>

  <!-- Divider -->
  <line x1="480" y1="100" x2="480" y2="380" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="420" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>
