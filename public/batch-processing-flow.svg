<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Single item -->
  <text x="120" y="40" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Input</text>

  <!-- Stack of items -->
  <rect x="60" y="55" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5" opacity="0.4"/>
  <rect x="55" y="65" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5" opacity="0.6"/>
  <rect x="50" y="75" width="120" height="24" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5" opacity="0.8"/>
  <rect x="45" y="85" width="120" height="24" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="101" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">item 1</text>

  <rect x="45" y="115" width="120" height="24" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="131" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">item 2</text>

  <rect x="45" y="145" width="120" height="24" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="161" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">item 3</text>

  <text x="105" y="188" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">...</text>

  <rect x="45" y="200" width="120" height="24" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="105" y="216" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">item 300</text>

  <!-- Arrow into pipeline -->
  <path d="M 190 140 L 270 140" stroke="url(#purple)" stroke-width="3"/>
  <polygon points="270,133 286,140 270,147" fill="url(#purple)"/>

  <!-- Processing pipeline -->
  <rect x="300" y="60" width="340" height="170" rx="14" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="470" y="85" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Batch Processing</text>

  <!-- Pipeline steps -->
  <rect x="320" y="100" width="90" height="35" rx="6" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
  <text x="365" y="122" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">Read</text>

  <path d="M 415 117 L 430 117" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="430,113 438,117 430,121" fill="#a78bfa"/>

  <rect x="442" y="100" width="90" height="35" rx="6" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
  <text x="487" y="122" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">Process</text>

  <path d="M 537 117 L 552 117" stroke="#a78bfa" stroke-width="1.5"/>
  <polygon points="552,113 560,117 552,121" fill="#a78bfa"/>

  <rect x="564" y="100" width="60" height="35" rx="6" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1"/>
  <text x="594" y="122" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">Save</text>

  <!-- Progress bar -->
  <rect x="320" y="155" width="300" height="12" rx="6" fill="#334155"/>
  <rect x="320" y="155" width="220" height="12" rx="6" fill="url(#green)"/>
  <text x="470" y="190" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="600">73% complete...</text>

  <!-- Repeat icon inside -->
  <path d="M 355 200 A 10 10 0 1 1 375 210" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="375,206 380,214 372,213" fill="#64748b"/>
  <text x="398" y="213" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">for each item</text>

  <!-- Arrow out -->
  <path d="M 660 140 L 720 140" stroke="url(#green)" stroke-width="3"/>
  <polygon points="720,133 736,140 720,147" fill="url(#green)"/>

  <!-- Results -->
  <text x="840" y="40" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Output</text>

  <rect x="770" y="60" width="140" height="170" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

  <polyline points="795,85 802,93 815,78" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="830" y="89" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">Done</text>

  <polyline points="795,108 802,116 815,101" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="830" y="112" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">Done</text>

  <polyline points="795,131 802,139 815,124" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="830" y="135" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">Done</text>

  <text x="840" y="162" fill="#64748b" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">...</text>

  <polyline points="795,177 802,185 815,170" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="830" y="181" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">Done</text>

  <text x="840" y="215" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="13" font-weight="700">300/300</text>

  <!-- Footer -->
  <text x="480" y="272" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>