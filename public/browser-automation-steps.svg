<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Step 1: Record -->
  <rect x="80" y="60" width="200" height="160" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <!-- Record circle icon -->
  <circle cx="180" cy="120" r="30" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="180" cy="120" r="14" fill="#ef4444" opacity="0.8"/>
  <text x="180" y="175" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Record</text>
  <text x="180" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Do the task once</text>
  <text x="180" y="45" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Step 1</text>

  <!-- Arrow 1 -->
  <path d="M 300 140 L 360 140" stroke="url(#purple)" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="360,133 376,140 360,147" fill="url(#purple)"/>

  <!-- Step 2: Save -->
  <rect x="390" y="60" width="200" height="160" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <!-- Save/disk icon -->
  <rect x="460" y="95" width="40" height="36" rx="4" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <rect x="468" y="95" width="24" height="14" rx="2" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <rect x="466" y="115" width="28" height="12" rx="2" fill="#7c3aed" opacity="0.3"/>
  <text x="490" y="175" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Save</text>
  <text x="490" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Steps are captured</text>
  <text x="490" y="45" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Step 2</text>

  <!-- Arrow 2 -->
  <path d="M 610 140 L 670 140" stroke="url(#green)" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="670,133 686,140 670,147" fill="url(#green)"/>

  <!-- Step 3: Replay -->
  <rect x="700" y="60" width="200" height="160" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <!-- Play triangle icon -->
  <polygon points="775,95 775,145 815,120" fill="#10b981" opacity="0.8"/>
  <text x="800" y="175" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Replay</text>
  <text x="800" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Run anytime, hands-free</text>
  <text x="800" y="45" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Step 3</text>

  <!-- Footer -->
  <text x="480" y="270" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>