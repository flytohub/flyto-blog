<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="48" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Exchange Rate Alert</text>
  <text x="480" y="74" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">Live rates — free API — instant notifications</text>

  <!-- 3-step flow -->
  <!-- Step 1: Fetch -->
  <rect x="80" y="120" width="240" height="160" rx="12" fill="#1e293b" stroke="url(#blue)" stroke-width="1.5"/>
  <text x="200" y="155" text-anchor="middle" fill="url(#blue)" font-family="system-ui,sans-serif" font-size="16" font-weight="700">1. Fetch Rate</text>
  <text x="200" y="185" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">GET /v6/latest/USD</text>
  <rect x="110" y="205" width="180" height="52" rx="8" fill="#334155"/>
  <text x="200" y="227" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13">USD → EUR  0.92</text>
  <text x="200" y="247" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13">USD → JPY  149.85</text>

  <!-- Arrow 1→2 -->
  <line x1="320" y1="200" x2="360" y2="200" stroke="#475569" stroke-width="2"/>
  <polygon points="358,194 370,200 358,206" fill="#475569"/>

  <!-- Step 2: Build Report -->
  <rect x="370" y="120" width="220" height="160" rx="12" fill="#1e293b" stroke="url(#amber)" stroke-width="1.5"/>
  <text x="480" y="155" text-anchor="middle" fill="url(#amber)" font-family="system-ui,sans-serif" font-size="16" font-weight="700">2. Build Report</text>
  <rect x="395" y="175" width="170" height="84" rx="8" fill="#334155"/>
  <text x="480" y="200" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">Exchange Rate Report</text>
  <text x="480" y="218" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Base: USD</text>
  <text x="480" y="236" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">EUR: 0.92 | JPY: 149.85</text>
  <text x="480" y="250" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Updated: Mar 13, 2026</text>

  <!-- Arrow 2→3 -->
  <line x1="590" y1="200" x2="630" y2="200" stroke="#475569" stroke-width="2"/>
  <polygon points="628,194 640,200 628,206" fill="#475569"/>

  <!-- Step 3: Notify -->
  <rect x="640" y="120" width="240" height="160" rx="12" fill="#1e293b" stroke="url(#green)" stroke-width="1.5"/>
  <text x="760" y="155" text-anchor="middle" fill="url(#green)" font-family="system-ui,sans-serif" font-size="16" font-weight="700">3. Send Alert</text>

  <rect x="670" y="175" width="180" height="32" rx="6" fill="#334155"/>
  <text x="760" y="196" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="13">Telegram</text>

  <rect x="670" y="215" width="180" height="32" rx="6" fill="#334155"/>
  <text x="760" y="236" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="13">Discord / Slack / LINE</text>

  <!-- Bottom: features -->
  <rect x="140" y="320" width="200" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="350" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="14" font-weight="600">No API Key Needed</text>
  <text x="240" y="372" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">1,500 free requests/month</text>

  <rect x="380" y="320" width="200" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="480" y="350" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="14" font-weight="600">150+ Currencies</text>
  <text x="480" y="372" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">Including crypto</text>

  <rect x="620" y="320" width="200" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="720" y="350" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="14" font-weight="600">3 Steps, 0 Code</text>
  <text x="720" y="372" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">Import → Configure → Run</text>

  <!-- Footer -->
  <text x="480" y="425" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">Community template — flyto2.com/marketplace</text>
</svg>
