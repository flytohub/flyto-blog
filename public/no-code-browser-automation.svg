<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">No-Code Browser Automation</text>

  <!-- Browser window -->
  <rect x="300" y="110" width="360" height="250" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="300" y="110" width="360" height="36" rx="12" fill="#334155"/>
  <rect x="300" y="134" width="360" height="12" fill="#334155"/>
  <circle cx="322" cy="128" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="340" cy="128" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="358" cy="128" r="6" fill="#10b981" opacity="0.7"/>

  <!-- Play button in center of browser -->
  <circle cx="480" cy="255" r="50" fill="#1e293b" stroke="url(#purple)" stroke-width="3"/>
  <polygon points="466,232 466,278 506,255" fill="url(#purple)"/>

  <!-- Cursor -->
  <g transform="translate(520, 275)">
    <path d="M 0 0 L 0 24 L 7 18 L 14 28 L 18 26 L 11 16 L 20 14 Z" fill="#e2e8f0" stroke="#0f172a" stroke-width="1"/>
  </g>

  <!-- Automation dots trail -->
  <circle cx="380" cy="190" r="4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="420" cy="180" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="460" cy="175" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="500" cy="180" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="540" cy="190" r="4" fill="#a78bfa" opacity="0.4"/>

  <!-- Footer -->
  <text x="480" y="410" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>