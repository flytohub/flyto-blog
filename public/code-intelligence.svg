<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="48" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="24" font-weight="700">Know What Breaks Before You Change It</text>
  <text x="480" y="74" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="14">flyto-indexer — impact analysis for AI coding assistants</text>

  <!-- Center: target function -->
  <rect x="355" y="110" width="250" height="52" rx="10" fill="#1e293b" stroke="url(#cyan)" stroke-width="2"/>
  <text x="480" y="136" text-anchor="middle" fill="url(#cyan)" font-family="monospace" font-size="16" font-weight="600">validateOrder()</text>
  <text x="480" y="153" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">target symbol</text>

  <!-- Arrow down -->
  <text x="480" y="185" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="22">↓</text>

  <!-- Impact result box -->
  <rect x="140" y="195" width="680" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="224" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="600">impact(target="validateOrder")</text>

  <!-- Reference lines -->
  <text x="170" y="254" fill="#94a3b8" font-family="monospace" font-size="12">backend/checkout.py:42      calls validateOrder()</text>
  <text x="170" y="274" fill="#94a3b8" font-family="monospace" font-size="12">backend/api/orders.py:18    imports validateOrder</text>
  <text x="170" y="294" fill="#94a3b8" font-family="monospace" font-size="12">frontend/Cart.vue:55        calls via useCheckout()</text>
  <text x="170" y="314" fill="#94a3b8" font-family="monospace" font-size="12">frontend/QuickBuy.vue:23    calls via useCheckout()</text>
  <text x="170" y="334" fill="#94a3b8" font-family="monospace" font-size="12">tests/test_orders.py:12     unit test</text>

  <!-- Risk badge -->
  <rect x="620" y="244" width="170" height="36" rx="8" fill="#1e293b" stroke="url(#red)" stroke-width="1.5"/>
  <text x="705" y="267" text-anchor="middle" fill="url(#red)" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Risk: HIGH</text>

  <!-- Cross-project badge -->
  <rect x="620" y="294" width="170" height="36" rx="8" fill="#1e293b" stroke="url(#yellow)" stroke-width="1.5"/>
  <text x="705" y="317" text-anchor="middle" fill="url(#yellow)" font-family="system-ui,sans-serif" font-size="14" font-weight="600">3 projects affected</text>

  <!-- Footer -->
  <text x="480" y="425" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">grep finds text — flyto-indexer finds dependencies</text>
</svg>
