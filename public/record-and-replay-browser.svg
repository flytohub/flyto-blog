<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Record and Replay</text>

  <!-- Record button -->
  <g transform="translate(280, 140)">
    <circle cx="60" cy="60" r="55" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <circle cx="60" cy="60" r="22" fill="#ef4444"/>
    <text x="60" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Record</text>
  </g>

  <!-- Arrow -->
  <path d="M 430 200 L 510 200" stroke="#475569" stroke-width="2.5" stroke-dasharray="8 4"/>
  <polygon points="510,193 526,200 510,207" fill="#475569"/>

  <!-- Replay button -->
  <g transform="translate(560, 140)">
    <circle cx="60" cy="60" r="55" fill="#1e293b" stroke="url(#purple)" stroke-width="3"/>
    <!-- Replay circular arrows -->
    <path d="M 40 45 A 28 28 0 1 1 38 70" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <polygon points="32,64 40,74 44,62" fill="#a78bfa"/>
    <text x="60" y="140" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Replay</text>
  </g>

  <!-- Action steps below -->
  <g transform="translate(240, 320)">
    <rect x="0" y="0" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="50" y="20" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Click</text>
    <path d="M 105 15 L 130 15" stroke="#334155" stroke-width="1.5"/>
    <polygon points="128,10 136,15 128,20" fill="#334155"/>

    <rect x="140" y="0" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="190" y="20" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Type</text>
    <path d="M 245 15 L 270 15" stroke="#334155" stroke-width="1.5"/>
    <polygon points="268,10 276,15 268,20" fill="#334155"/>

    <rect x="280" y="0" width="100" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="330" y="20" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Navigate</text>
    <path d="M 385 15 L 410 15" stroke="#334155" stroke-width="1.5"/>
    <polygon points="408,10 416,15 408,20" fill="#334155"/>

    <rect x="420" y="0" width="100" height="30" rx="6" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="470" y="20" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11">Done</text>
  </g>

  <!-- Footer -->
  <text x="480" y="410" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>