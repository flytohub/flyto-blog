<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Web Scraping Without Code</text>

  <!-- Browser window -->
  <rect x="260" y="110" width="440" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Browser bar -->
  <rect x="260" y="110" width="440" height="36" rx="12" fill="#334155"/>
  <rect x="260" y="134" width="440" height="12" fill="#334155"/>
  <circle cx="282" cy="128" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="300" cy="128" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="318" cy="128" r="6" fill="#10b981" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="340" y="120" width="200" height="16" rx="4" fill="#1e293b"/>

  <!-- Website content lines -->
  <rect x="285" y="165" width="160" height="10" rx="3" fill="#475569"/>
  <rect x="285" y="185" width="120" height="8" rx="3" fill="#334155"/>
  <rect x="285" y="200" width="140" height="8" rx="3" fill="#334155"/>
  <rect x="285" y="215" width="100" height="8" rx="3" fill="#334155"/>
  <rect x="285" y="235" width="160" height="10" rx="3" fill="#475569"/>
  <rect x="285" y="255" width="130" height="8" rx="3" fill="#334155"/>
  <rect x="285" y="270" width="150" height="8" rx="3" fill="#334155"/>
  <rect x="285" y="285" width="110" height="8" rx="3" fill="#334155"/>

  <!-- Arrow from browser to table -->
  <path d="M 530 230 L 590 230" stroke="url(#purple)" stroke-width="3" stroke-dasharray="6 4"/>
  <polygon points="590,222 606,230 590,238" fill="url(#purple)"/>

  <!-- Extracted table -->
  <rect x="610" y="170" width="70" height="20" rx="3" fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="1"/>
  <rect x="610" y="195" width="70" height="16" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="610" y="215" width="70" height="16" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="610" y="235" width="70" height="16" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="610" y="255" width="70" height="16" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="610" y="275" width="70" height="16" rx="2" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Table header text -->
  <text x="645" y="184" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="9" font-weight="600">DATA</text>

  <!-- Checkmarks in table rows -->
  <text x="645" y="207" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">row 1</text>
  <text x="645" y="227" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">row 2</text>
  <text x="645" y="247" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">row 3</text>
  <text x="645" y="267" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">row 4</text>
  <text x="645" y="287" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="10">row 5</text>

  <!-- Footer -->
  <text x="480" y="410" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>