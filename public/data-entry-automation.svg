<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Data Entry Automation</text>

  <!-- Form -->
  <rect x="330" y="100" width="300" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="480" y="130" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Web Form</text>

  <!-- Form field 1 - filled -->
  <text x="360" y="162" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Name</text>
  <rect x="360" y="168" width="240" height="28" rx="4" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="375" y="186" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12">John Smith</text>
  <!-- Checkmark -->
  <path d="M 618 176 L 624 184 L 636 168" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Form field 2 - filled -->
  <text x="360" y="214" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Email</text>
  <rect x="360" y="220" width="240" height="28" rx="4" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="375" y="238" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12">john@example.com</text>
  <!-- Checkmark -->
  <path d="M 618 228 L 624 236 L 636 220" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Form field 3 - being filled -->
  <text x="360" y="266" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Phone</text>
  <rect x="360" y="272" width="240" height="28" rx="4" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="375" y="290" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12">+1 555-01</text>
  <!-- Typing cursor -->
  <rect x="432" y="278" width="2" height="16" fill="#a78bfa"/>

  <!-- Form field 4 - empty -->
  <text x="360" y="318" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Address</text>
  <rect x="360" y="324" width="240" height="28" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>

  <!-- Auto-fill lightning bolt -->
  <g transform="translate(470, 370)">
    <polygon points="8,0 0,14 7,14 4,24 16,10 9,10 12,0" fill="url(#purple)"/>
  </g>
  <text x="480" y="406" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11">Auto-filling...</text>

  <!-- Footer -->
  <text x="480" y="430" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>