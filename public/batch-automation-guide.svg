<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Batch Automation Guide</text>

  <!-- Input items (left) -->
  <g transform="translate(180, 110)">
    <rect x="0" y="0" width="140" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="70" y="20" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Item 1</text>

    <rect x="0" y="40" width="140" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="70" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Item 2</text>

    <rect x="0" y="80" width="140" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="70" y="100" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Item 3</text>

    <rect x="0" y="120" width="140" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="70" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Item 4</text>

    <text x="70" y="175" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">... x100</text>
  </g>

  <!-- Arrows to processor -->
  <path d="M 340 180 L 400 180" stroke="#475569" stroke-width="2"/>
  <path d="M 340 200 L 400 200" stroke="#475569" stroke-width="2"/>
  <path d="M 340 220 L 400 220" stroke="#475569" stroke-width="2"/>
  <polygon points="398,174 410,180 398,186" fill="#475569"/>
  <polygon points="398,194 410,200 398,206" fill="#475569"/>
  <polygon points="398,214 410,220 398,226" fill="#475569"/>

  <!-- Processor box -->
  <rect x="420" y="140" width="120" height="120" rx="14" fill="#1e293b" stroke="url(#purple)" stroke-width="2.5"/>
  <text x="480" y="190" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Batch</text>
  <text x="480" y="210" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Process</text>
  <!-- Parallel lines inside -->
  <rect x="445" y="222" width="70" height="3" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="445" y="230" width="70" height="3" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="445" y="238" width="70" height="3" rx="1" fill="#7c3aed" opacity="0.5"/>

  <!-- Arrows to output -->
  <path d="M 550 180 L 610 180" stroke="#475569" stroke-width="2"/>
  <path d="M 550 200 L 610 200" stroke="#475569" stroke-width="2"/>
  <path d="M 550 220 L 610 220" stroke="#475569" stroke-width="2"/>
  <polygon points="608,174 620,180 608,186" fill="#475569"/>
  <polygon points="608,194 620,200 608,206" fill="#475569"/>
  <polygon points="608,214 620,220 608,226" fill="#475569"/>

  <!-- Output items (right) - with checkmarks -->
  <g transform="translate(630, 110)">
    <rect x="0" y="0" width="140" height="30" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="55" y="20" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">Done</text>
    <path d="M 108 10 L 114 18 L 126 4" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>

    <rect x="0" y="40" width="140" height="30" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="55" y="60" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">Done</text>
    <path d="M 108 50 L 114 58 L 126 44" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>

    <rect x="0" y="80" width="140" height="30" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="55" y="100" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">Done</text>
    <path d="M 108 90 L 114 98 L 126 84" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>

    <rect x="0" y="120" width="140" height="30" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="55" y="140" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11">Done</text>
    <path d="M 108 130 L 114 138 L 126 124" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>

    <text x="70" y="175" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="12">All complete</text>
  </g>

  <!-- Speed indicator -->
  <text x="480" y="330" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="16" font-weight="600">100 items in parallel</text>
  <text x="480" y="352" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">Minutes instead of hours</text>

  <!-- Footer -->
  <text x="480" y="410" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="13">flyto2.com</text>
</svg>