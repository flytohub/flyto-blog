<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="300" rx="12" fill="url(#bg)"/>

  <!-- Left: n8n approach -->
  <rect x="60" y="40" width="380" height="210" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="250" y="68" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="700">n8n: API Nodes</text>

  <!-- API node boxes connected -->
  <rect x="90" y="90" width="80" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="112" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">HTTP</text>

  <line x1="170" y1="107" x2="200" y2="107" stroke="#475569" stroke-width="1.5"/>

  <rect x="200" y="90" width="80" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Transform</text>

  <line x1="280" y1="107" x2="310" y2="107" stroke="#475569" stroke-width="1.5"/>

  <rect x="310" y="90" width="80" height="35" rx="6" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <text x="350" y="112" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Output</text>

  <!-- Limitations -->
  <text x="250" y="155" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Requires API access</text>

  <!-- X marks for limitations -->
  <text x="100" y="180" fill="#ef4444" font-family="system-ui,sans-serif" font-size="11">x</text>
  <text x="115" y="180" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">No browser control</text>

  <text x="100" y="200" fill="#ef4444" font-family="system-ui,sans-serif" font-size="11">x</text>
  <text x="115" y="200" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Needs Docker/server</text>

  <text x="100" y="220" fill="#ef4444" font-family="system-ui,sans-serif" font-size="11">x</text>
  <text x="115" y="220" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">JSON mapping required</text>

  <!-- VS -->
  <text x="480" y="150" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="20" font-weight="700">vs</text>

  <!-- Right: Flyto2 approach -->
  <rect x="520" y="40" width="380" height="210" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="2"/>
  <text x="710" y="68" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="15" font-weight="700">Flyto2: Browser Recording</text>

  <!-- Browser window mini -->
  <rect x="570" y="85" width="260" height="50" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <rect x="570" y="85" width="260" height="16" rx="6" fill="#334155"/>
  <rect x="570" y="95" width="260" height="6" fill="#334155"/>
  <circle cx="582" cy="93" r="3" fill="#ef4444" opacity="0.6"/>
  <circle cx="592" cy="93" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="602" cy="93" r="3" fill="#10b981" opacity="0.6"/>
  <!-- Content inside -->
  <rect x="580" y="108" width="50" height="6" rx="2" fill="#475569"/>
  <rect x="580" y="118" width="35" height="5" rx="2" fill="#334155"/>
  <rect x="660" y="108" width="60" height="16" rx="4" fill="#7c3aed" opacity="0.4"/>
  <text x="690" y="120" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="8">Click</text>

  <!-- Advantages -->
  <text x="710" y="158" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Works on any website</text>

  <text x="558" y="180" fill="#10b981" font-family="system-ui,sans-serif" font-size="13">+</text>
  <text x="575" y="180" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">Real browser automation</text>

  <text x="558" y="200" fill="#10b981" font-family="system-ui,sans-serif" font-size="13">+</text>
  <text x="575" y="200" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">No Docker, runs locally</text>

  <text x="558" y="220" fill="#10b981" font-family="system-ui,sans-serif" font-size="13">+</text>
  <text x="575" y="220" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">AI builds workflows for you</text>

  <!-- Footer -->
  <text x="480" y="280" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="12">flyto2.com</text>
</svg>