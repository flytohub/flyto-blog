name: Video Render

on:
  workflow_dispatch:
    inputs:
      plan:
        description: Video plan path
        required: true
        default: video/plans/community-growth-open-source-ai-workflow-automation.json
      variant:
        description: Output variant id, or all
        required: true
        default: all

permissions:
  contents: read

concurrency:
  group: video-render
  cancel-in-progress: false

jobs:
  render:
    name: Render review video artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VIDEO_PLAN: ${{ github.event.inputs.plan || 'video/plans/community-growth-open-source-ai-workflow-automation.json' }}
      VIDEO_VARIANT: ${{ github.event.inputs.variant || 'all' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: npm ci
      - name: Install render tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin fonts-dejavu-core
          python -m pip install edge-tts==7.2.8
          npx playwright install --with-deps chromium
      - name: Validate video plan
        run: npm run video:check -- --plan "${VIDEO_PLAN}"
      - name: QA video metadata
        run: npm run video:qa -- --plan "${VIDEO_PLAN}"
      - name: Capture live Flyto2 product demo
        run: npm run video:capture -- --plan "${VIDEO_PLAN}"
      - name: Fetch licensed human B-roll
        run: npm run video:assets -- --plan "${VIDEO_PLAN}" --required
      - name: Generate neural voiceover
        run: npm run video:voiceover -- --plan "${VIDEO_PLAN}" --required
      - name: Render MP4 draft
        run: |
          if [ "${VIDEO_VARIANT}" = "all" ]; then
            npm run video:render -- --plan "${VIDEO_PLAN}" --mp4
          else
            npm run video:render -- --plan "${VIDEO_PLAN}" --variant "${VIDEO_VARIANT}" --mp4
          fi
      - name: Verify rendered media streams
        run: npm run video:artifact-qa -- --plan "${VIDEO_PLAN}" --variant "${VIDEO_VARIANT}"
      - uses: actions/upload-artifact@v4
        with:
          name: flyto2-video-draft
          path: video/dist/**
          if-no-files-found: error
          retention-days: 14
