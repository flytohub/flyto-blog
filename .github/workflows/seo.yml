name: SEO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: seo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo:
    name: SEO surface gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install Flyto2 Indexer
        run: python -m pip install "flyto-indexer @ git+https://github.com/flytohub/flyto-indexer@7ad6917887ffde8e43a3cee029c849a1a0ba2909"
      - name: Verify source and documentation graph
        run: flyto-index verify . --full-scan --strict --json
      - run: npm run verify
      - name: Upload SEO score report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flyto2-seo-score-report
          path: |
            .seo/reports/seo-score.*
            .seo/reports/seo-management.*
          if-no-files-found: ignore
          retention-days: 14
      - name: Lighthouse SEO
        run: npx @lhci/cli@0.15.1 autorun --config=./lighthouserc.cjs
      - name: Generate external link manifest
        run: npm run links:external -- .external-links.txt
      - name: Link check public SEO surfaces
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          fail: true
          failIfEmpty: true
          format: markdown
          output: lychee-seo-report.md
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --max-concurrency 8
            --scheme http
            --scheme https
            --exclude '^https://blog\.flyto2\.com'
            --accept 200,204,206,301,302,307,308,429
            './.external-links.txt'
